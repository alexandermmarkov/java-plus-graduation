services:
  stats-db:
    image: postgres:16.1
    container_name: stats-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_PASSWORD=100
      - POSTGRES_USER=admin
      - POSTGRES_DB=stats-db

  event-db:
    image: postgres:16.1
    container_name: event-db
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_PASSWORD=100
      - POSTGRES_USER=admin
      - POSTGRES_DB=event-db

  user-db:
    image: postgres:16.1
    container_name: user-db
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_PASSWORD=100
      - POSTGRES_USER=admin
      - POSTGRES_DB=user-db

  request-db:
    image: postgres:16.1
    container_name: request-db
    ports:
      - "5436:5432"
    environment:
      - POSTGRES_PASSWORD=100
      - POSTGRES_USER=admin
      - POSTGRES_DB=request-db

  comment-db:
    image: postgres:16.1
    container_name: comment-db
    ports:
      - "5437:5432"
    environment:
      - POSTGRES_PASSWORD=100
      - POSTGRES_USER=admin
      - POSTGRES_DB=comment-db