services:
  stats-db:
    image: postgres:16.1
    container_name: stats-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_PASSWORD=100
      - POSTGRES_USER=admin
      - POSTGRES_DB=stats-db

  event-db:
    image: postgres:16.1
    container_name: event-db
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_PASSWORD=100
      - POSTGRES_USER=admin
      - POSTGRES_DB=event-db

  user-db:
    image: postgres:16.1
    container_name: user-db
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_PASSWORD=100
      - POSTGRES_USER=admin
      - POSTGRES_DB=user-db

  request-db:
    image: postgres:16.1
    container_name: request-db
    ports:
      - "5436:5432"
    environment:
      - POSTGRES_PASSWORD=100
      - POSTGRES_USER=admin
      - POSTGRES_DB=request-db

  comment-db:
    image: postgres:16.1
    container_name: comment-db
    ports:
      - "5437:5432"
    environment:
      - POSTGRES_PASSWORD=100
      - POSTGRES_USER=admin
      - POSTGRES_DB=comment-db

  recommendation_db:
    image: postgres:16.1
    container_name: recommendation_db
    ports:
      - "5438:5432"
    environment:
      - POSTGRES_PASSWORD=100
      - POSTGRES_USER=admin
      - POSTGRES_DB=recommendation_db

  kafka:
    image: confluentinc/confluent-local:7.4.3
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092" # for client connections
      - "9101:9101" # JMX
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      CLUSTER_ID: 'K0EA9p0yEe6MkAAAAkKsEg'

  kafka-init-topics:
    image: confluentinc/confluent-local:7.4.3
    container_name: kafka-init-topics
    depends_on:
      - kafka
    command: "bash -c \
                'kafka-topics --create --topic stats.user-actions.v1 \
                             --partitions 1 --replication-factor 1 --if-not-exists \
                             --bootstrap-server kafka:29092 && \
                kafka-topics --create --topic stats.events-similarity.v1 \
                             --partitions 1 --replication-factor 1 --if-not-exists \
                             --bootstrap-server kafka:29092'"
    init: true