server:
  port: 0

spring:
  application:
    name: aggregator

kafka:
  aggregator:
    bootstrap-servers: localhost:9092
    events-similarity-topic: stats.events-similarity.v1
    user-action-topic: stats.user-actions.v1
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: ru.practicum.ewm.kafka.serializer.GeneralAvroSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: ru.practicum.ewm.kafka.serializer.UserActionDeserializer
      group-id: aggregator-group
      client-id: consumer-1
      properties:
        fetch.min.bytes: 1
        max.poll.records: 100
        enable.auto.commit: false
        fetch.max.wait.ms: 1000
        max.partition.fetch.bytes: 1048576
        session.timeout.ms: 30000
        max.poll.interval.ms: 300000
        heartbeat.interval.ms: 10000

user-action:
  view: 0.4
  register: 0.8
  like: 1.0

management:
  endpoints:
    web:
      exposure:
        include: "health,circuitbreakers,metrics,env"
  endpoint:
    health:
      show-details: always